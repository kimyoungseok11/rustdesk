name: CI

on:
    push:
        branches: [master, main]
    pull_request:

jobs:
    build:
        name: Build (${{ matrix.os }})
        runs-on: ${{ matrix.os }}

        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-latest, macos-latest, windows-latest]

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Install Rust
              uses: actions-rs/toolchain@v1
              with:
                  toolchain: stable
                  profile: minimal
                  override: true

            # ---------- OS별 빌드 ----------
            - name: Build (Linux / macOS)
              if: runner.os != 'Windows'
              run: |
                  cargo build --release

            - name: Build (Windows)
              if: runner.os == 'Windows'
              run: |
                  cargo build --release

            # ---------- 디버그 (경로 확인용) ----------
            - name: List build output
              if: always()
              shell: bash
              run: |
                  echo "==== target/release ===="
                  ls -al target/release || true

            # ---------- Artifact 업로드 ----------
            - name: Upload artifact (Linux)
              if: runner.os == 'Linux'
              uses: actions/upload-artifact@v4
              with:
                  name: rustdesk-linux
                  path: |
                      target/release/rustdesk

            - name: Upload artifact (macOS)
              if: runner.os == 'macOS'
              uses: actions/upload-artifact@v4
              with:
                  name: rustdesk-macos
                  path: |
                      target/release/rustdesk

            - name: Upload artifact (Windows)
              if: runner.os == 'Windows'
              uses: actions/upload-artifact@v4
              with:
                  name: rustdesk-windows
                  path: |
                      target/release/rustdesk.exe
